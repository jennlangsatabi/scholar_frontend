staticSites:
  - name: scholar-frontend
    buildCommand: bash tools/render_build.sh
    publishPath: build/web
    pullRequestPreviewsEnabled: true
    envVars:
      - key: API_BASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
