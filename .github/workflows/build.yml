name: SonarCloud

on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate SONAR_TOKEN
        shell: bash
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "::error title=Missing SONAR_TOKEN::Set repository secret SONAR_TOKEN."
            exit 1
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.organization=jennlangsatabi
            -Dsonar.projectKey=jennlangsatabi_scholar_frontend
            -Dsonar.projectName=scholar_frontend
            -Dsonar.verbose=true

      - name: Show SonarCloud report URL
        if: always()
        shell: bash
        run: |
          if [ -f .scannerwork/report-task.txt ]; then
            echo "---- .scannerwork/report-task.txt ----"
            cat .scannerwork/report-task.txt
          else
            echo "report-task.txt not found (scanner may not have executed)."
            exit 1
          fi
