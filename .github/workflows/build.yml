name: SonarCloud

on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build
        run: flutter pub get

      - name: Configure SonarCloud new code
        shell: bash
        run: |
          curl --fail --silent --show-error -u "${SONAR_TOKEN}:" \
            -X POST "https://sonarcloud.io/api/settings/set" \
            -d "component=VHIANCEERICH_scholar_frontend" \
            -d "key=sonar.leak.period" \
            -d "value=30"
          curl --fail --silent --show-error -u "${SONAR_TOKEN}:" \
            -X POST "https://sonarcloud.io/api/settings/set" \
            -d "component=VHIANCEERICH_scholar_frontend" \
            -d "key=sonar.leak.period.type" \
            -d "value=days"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
