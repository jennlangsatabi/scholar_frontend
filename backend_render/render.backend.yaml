services:
  - type: web
    name: scholar-backend
    runtime: docker
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /auth_login.php
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
